# render.yaml
services:
  - type: web
    name: cimetiere-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn cimetiere_backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cimetiere-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: cimetiere-db
    databaseName: cimetiere
    user: postgres
    plan: free